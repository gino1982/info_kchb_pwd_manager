{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/colors_and_type.css' %}">
<style>
    /* ============================================================
       KCHB Warm Earth — Django Admin overrides
       覆蓋 Django 內建 admin 的 CSS 變數，套用陶土 + 燕麥配色
       ============================================================ */
    :root {
        /* 側邊欄標題、過濾器標題、按鈕主色 — 陶土 Clay 500 */
        --primary: #B4502E;

        /* 最上方大頭條的背景色 */
        --header-bg: #B4502E;
        --header-color: #FFFCF6;
        --header-link-color: #FFFCF6;

        /* 按鈕 hover 時的深色 — Clay 600 */
        --secondary: #933E23;

        /* 麵包屑導覽列背景 — Clay 700（深陶土） */
        --breadcrumbs-bg: #712E1B;
        --breadcrumbs-fg: #FBEDE6;
        --breadcrumbs-link-fg: #FFFCF6;

        /* 連結、焦點、強調色 */
        --link-fg: #933E23;
        --link-hover-color: #712E1B;
        --link-selected-fg: #B4502E;

        /* 表格選取、hover 用溫暖色調 */
        --selected-row: #FBEDE6;
        --selected-bg: #F5EFE4;

        /* 按鈕主色 */
        --button-bg: #B4502E;
        --button-fg: #FFFCF6;
        --button-hover-bg: #933E23;
        --default-button-bg: #B4502E;
        --default-button-hover-bg: #933E23;

        /* 危險動作（刪除）保留紅銹色 */
        --delete-button-bg: #B24A22;
        --delete-button-hover-bg: #7A2F12;

        /* 背景色改為暖白 */
        --body-bg: #FBF8F2;
        --body-fg: #14100A;
        --body-quiet-color: #5E5340;
        --body-loud-color: #251F16;

        /* 卡片、模組背景 */
        --darkened-bg: #F5EFE4;
        --border-color: rgba(61, 53, 40, 0.16);
        --hairline-color: rgba(61, 53, 40, 0.10);
    }

    /* ---- Logo / 站名：強制白字加粗 (改用思源宋體) ---- */
    #site-name a {
        color: #FFFFFF !important;
        
        /* 指定使用思源宋體 (Noto Serif TC)，如果抓不到再退回一般 serif */
        font-family: "Noto Serif TC", "Source Han Serif TC", serif !important; 
        
        font-weight: 700 !important; /* 粗度：700 粗體 */
        font-size: 24px !important;  /* 字級：24px */
        letter-spacing: 1.5px !important; /* 稍微拉開字距，增加大氣感 */
    }

    #content h1 {
        font-family: "Noto Serif TC", "Source Han Serif TC", serif !important;
        font-weight: 700 !important;          /* 一樣使用 700 粗體增加份量 */
        letter-spacing: 1px !important;       /* 稍微拉開一點字距 */
        color: #5C3A21 !important;            /* 換成深咖啡色，跟你的大地色系更搭 */
        text-align: center !important;
        margin-top: 20px;
    }


    /* ---- 右上角使用者工具：字級加大 + 粗體 ---- */
    #user-tools,
    #user-tools a,
    #user-tools strong,
    #user-tools button {
        font-size: 15px !important;
        font-weight: 600 !important;
        color: #FFFCF6 !important;
    }
    #user-tools a:hover {
        color: #F5D5C4 !important;
    }

    /* ---- 隱藏日/夜間模式切換按鈕 ---- */
    .theme-toggle {
        display: none !important;
    }


    /* ---- 全站字體改用 Noto Sans TC ---- */
    body, input, textarea, select, button, .form-row {
        font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont,
                     "PingFang TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
    }

    /* ---- 圓角加大（呼應設計系統的 generous rounding） ---- */
    .button, input[type=submit], input[type=button],
    .submit-row input, a.button {
        border-radius: 14px !important;
        padding: 8px 16px !important;
        font-weight: 500 !important;
        border: none !important;
        box-shadow: 0 1px 2px rgba(61, 53, 40, 0.06);
        transition: background 120ms ease;
    }

    /* 模組卡片、表格圓角 */
    .module, .dashboard .module,
    #changelist table, .inline-group, fieldset.module {
        border-radius: 20px !important;
        overflow: hidden;
        border: 1px solid rgba(61, 53, 40, 0.10) !important;
    }

    /* 輸入框圓角 */
    input[type=text], input[type=password], input[type=email],
    input[type=url], input[type=number], textarea, select {
        border-radius: 10px !important;
        border: 1px solid rgba(61, 53, 40, 0.16) !important;
        padding: 7px 10px !important;
    }
    input[type=text]:focus, input[type=password]:focus,
    input[type=email]:focus, textarea:focus, select:focus {
        border-color: #B4502E !important;
        outline: none !important;
        box-shadow: 0 0 0 3px #FBEDE6 !important;
    }

    /* 麵包屑微調 */
    div.breadcrumbs {
        padding: 12px 40px !important;
        font-size: 13px !important;
    }

    /* 頁首高度與 padding */
    #header {
        padding: 14px 40px !important;
    }

    /* 登入頁寬度加倍：頁首與欄位一起同步放大 */
    .login #container {
        width: 56em !important;
        min-width: 600px !important;
    }

    /* 側邊欄（Django 4.1+ 有的 nav-sidebar）暖色 */
    #nav-sidebar {
        background: #F5EFE4 !important;
    }
    #nav-sidebar .current-model {
        background: #FBEDE6 !important;
        border-left: 3px solid #B4502E !important;
    }

    /* 左側導覽列區塊標題（單一授權管理、局內系統管理）*/
    #nav-sidebar .module caption,
    #nav-sidebar .module caption a {
        font-family: "Noto Serif TC", "Source Han Serif TC", serif !important;
        font-size: 16px !important;
        font-weight: 700 !important;
        text-align: center !important;
        letter-spacing: 0.5px !important;
    }
    #nav-sidebar .module caption a {
        pointer-events: none !important;
        cursor: default !important;
        text-decoration: none !important;
        color: inherit !important;
    }
    #nav-sidebar .module caption a:hover {
        color: inherit !important;
        text-decoration: none !important;
    }

    /* 新增這段：控制「成功」提示訊息的顏色*/
    ul.messagelist li.success {
        background-color: #E8D5C4 !important; /* 這裡換成你想要的底色 (例如：淺奶茶色) */
        color: #5C3A21 !important;            /* 這裡換成你想要的文字顏色 (例如：深咖啡色) */
        border: none !important;              /* 把預設的邊框藏起來，看起來會更柔和 */
        /* background-image: none !important; */ /* 如果連原本的綠色小勾勾圖示都想藏起來，可以解除這行的註解 */
    }

/* ============================================================
       完全同步：讓右側「最近的動作」跟左側模組長得一模一樣
       ============================================================ */
       
    /* 1. 把外圍大箱子隱形，消滅雙重框線 */
    #content-related {
        background: transparent !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
    }

    /* 2. 讓右側的卡片擁有跟左側一樣的圓角與底色 */
    #content-related .module {
        background-color: var(--darkened-bg, #F5EFE4) !important;
        border-radius: 20px !important;
        overflow: hidden !important;
        border: 1px solid rgba(61, 53, 40, 0.10) !important;
        margin-bottom: 20px !important;
    }

    /* 3. 讓右側的標題擁有跟左側一樣的陶土色背景與白字！ */
    #content-related .module h2 {
        background-color: var(--primary, #B4502E) !important;
        color: var(--header-color, #FFFCF6) !important;
        padding: 10px 15px !important;
        margin: 0 !important;
        text-align: center !important;  
        
        /* ⬇️⬇️ 新增字體設定 ⬇️⬇️ */
        font-family: "Noto Serif TC", "Source Han Serif TC", serif !important; 
        font-weight: 700 !important; 
        letter-spacing: 1px !important;
    }

    #content-related .module h3 {
        display: none !important;
    }

    /* ⬇️⬇️⬇️ 左側模組標題：置中、思源宋體、放大兩號 ⬇️⬇️⬇️ */
    #content-main .module caption,
    #content-main .module caption a {
        text-align: center !important;
        font-family: "Noto Serif TC", "Source Han Serif TC", serif !important;
        font-size: 16px !important;   /* 字級放大兩號 */
        font-weight: 700 !important;  /* 搭配宋體加粗 */
        letter-spacing: 1px !important;
    }
    /* ⬆️⬆️⬆️ ---------------------------------------- ⬆️⬆️⬆️ */

    /* Center dashboard content with a responsive width around 80% */
    body.dashboard #content {
        width: min(80vw, 1280px) !important;
        max-width: none !important;
        margin: 0 auto !important;
        padding: 0 12px !important;
    }

    body.dashboard #content-main {
        float: left !important;
        width: 66% !important;
        margin-right: 2% !important;
    }

    body.dashboard #content-related {
        float: right !important;
        width: 32% !important;
        margin-right: 0 !important;
    }

    body.dashboard #content:after {
        content: "";
        display: table;
        clear: both;
    }

    @media (max-width: 1024px) {
        body.dashboard #content-main,
        body.dashboard #content-related {
            float: none !important;
            width: 100% !important;
            margin-right: 0 !important;
        }
    }

    /* ============================================================
       過濾器 (Filter Sidebar) — Warm Earth 整合設計
       ============================================================ */

    /* 外框：同模組卡片圓角風格 */
    #changelist-filter {
        background: #F5EFE4 !important;
        border-radius: 20px !important;
        overflow: hidden !important;
        border: 1px solid rgba(61, 53, 40, 0.10) !important;
        padding: 0 !important;
    }

    /* 標題列「過濾器」 */
    #changelist-filter h2 {
        background: #B4502E !important;
        color: #FFFCF6 !important;
        font-family: "Noto Serif TC", "Source Han Serif TC", serif !important;
        font-weight: 700 !important;
        font-size: 14px !important;
        letter-spacing: 1.5px !important;
        text-align: center !important;
        padding: 12px 16px !important;
        margin: 0 !important;
    }

    /* 頂部「顯示計數」連結區 */
    #changelist-filter-extra {
        padding: 10px 16px !important;
        border-bottom: 1px solid rgba(61, 53, 40, 0.10) !important;
    }
    #changelist-filter-extra a {
        font-size: 12px !important;
        color: #933E23 !important;
        text-decoration: none !important;
    }
    #changelist-filter-extra a:hover {
        color: #712E1B !important;
        text-decoration: underline !important;
    }

    /* 每個篩選區塊 */
    #changelist-filter details {
        border-bottom: 1px solid rgba(61, 53, 40, 0.08) !important;
        padding: 0 !important;
    }
    #changelist-filter details:last-child {
        border-bottom: none !important;
    }

    /* 區塊標題 <summary>（Django 6 新結構）與舊版 h3 共用 */
    #changelist-filter details summary,
    #changelist-filter h3 {
        font-size: 11px !important;
        font-weight: 700 !important;
        letter-spacing: 1.2px !important;
        text-transform: uppercase !important;
        color: #5E5340 !important;
        padding: 10px 16px 8px !important;
        margin: 0 !important;
        cursor: pointer !important;
        list-style: none !important;
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
        background: transparent !important;
    }
    #changelist-filter details summary::-webkit-details-marker {
        display: none !important;
    }
    /* 展開 / 收合箭頭 */
    #changelist-filter details summary::before {
        content: "▾" !important;
        font-size: 20px !important;
        color: #B4502E !important;
        display: inline-block !important;
        transition: transform 100ms ease !important;
    }
    #changelist-filter details:not([open]) summary::before {
        transform: rotate(-90deg) !important;
    }

    /* 選項列表 */
    #changelist-filter ul {
        list-style: none !important;
        margin: 0 0 8px !important;
        padding: 0 12px 4px !important;
    }
    #changelist-filter li {
        margin: 3px 0 !important;
    }

    /* 篩選連結：pill 膠囊風格 */
    #changelist-filter li a {
        display: block !important;
        padding: 5px 12px !important;
        border-radius: 20px !important;
        font-size: 13px !important;
        color: #5C3A21 !important;
        text-decoration: none !important;
        transition: background 120ms ease, color 120ms ease !important;
        line-height: 1.5 !important;
    }
    #changelist-filter li a:hover {
        background: #FBEDE6 !important;
        color: #712E1B !important;
    }

    /* 目前選取中的項目 */
    #changelist-filter li.selected {
        border-left: none !important;
        padding-left: 0 !important;
        margin-left: 0 !important;
    }
    #changelist-filter li.selected a {
        background: #B4502E !important;
        color: #FFFCF6 !important;
        font-weight: 600 !important;
    }
    #changelist-filter li.selected a:hover {
        background: #933E23 !important;
        color: #FFFCF6 !important;
    }

</style>
{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        <img src="{% static 'logo.png' %}" alt="衛生局Logo"
             style="height: 40px; vertical-align: middle; margin-right: 10px;">
        高雄市政府衛生局_系統帳密管理
    </a>
</div>
{% endblock %}
