{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/colors_and_type.css' %}">
<style>
    /* ============================================================
       KCHB Warm Earth — Django Admin overrides
       覆蓋 Django 內建 admin 的 CSS 變數，套用陶土 + 燕麥配色
       ============================================================ */
    :root {
        /* 側邊欄標題、過濾器標題、按鈕主色 — 陶土 Clay 500 */
        --primary: #B4502E;

        /* 最上方大頭條的背景色 */
        --header-bg: #B4502E;
        --header-color: #FFFCF6;
        --header-link-color: #FFFCF6;

        /* 按鈕 hover 時的深色 — Clay 600 */
        --secondary: #933E23;

        /* 麵包屑導覽列背景 — Clay 700（深陶土） */
        --breadcrumbs-bg: #712E1B;
        --breadcrumbs-fg: #FBEDE6;
        --breadcrumbs-link-fg: #FFFCF6;

        /* 連結、焦點、強調色 */
        --link-fg: #933E23;
        --link-hover-color: #712E1B;
        --link-selected-fg: #B4502E;

        /* 表格選取、hover 用溫暖色調 */
        --selected-row: #FBEDE6;
        --selected-bg: #F5EFE4;

        /* 按鈕主色 */
        --button-bg: #B4502E;
        --button-fg: #FFFCF6;
        --button-hover-bg: #933E23;
        --default-button-bg: #B4502E;
        --default-button-hover-bg: #933E23;

        /* 危險動作（刪除）保留紅銹色 */
        --delete-button-bg: #B24A22;
        --delete-button-hover-bg: #7A2F12;

        /* 背景色改為暖白 */
        --body-bg: #FBF8F2;
        --body-fg: #14100A;
        --body-quiet-color: #5E5340;
        --body-loud-color: #251F16;

        /* 卡片、模組背景 */
        --darkened-bg: #F5EFE4;
        --border-color: rgba(61, 53, 40, 0.16);
        --hairline-color: rgba(61, 53, 40, 0.10);
    }

    /* ---- Logo / 站名：強制白字加粗 ---- */
    #site-name a {
        color: #FFFFFF !important;
        font-weight: 700 !important;
        font-family: "Noto Sans TC", -apple-system, "Microsoft JhengHei", sans-serif !important;
    }

    /* ---- 右上角使用者工具：字級加大 + 粗體 ---- */
    #user-tools,
    #user-tools a,
    #user-tools strong,
    #user-tools button {
        font-size: 15px !important;
        font-weight: 600 !important;
        color: #FFFCF6 !important;
    }
    #user-tools a:hover {
        color: #F5D5C4 !important;
    }

    /* ---- 隱藏日/夜間模式切換按鈕 ---- */
    .theme-toggle {
        display: none !important;
    }


    /* ---- 全站字體改用 Noto Sans TC ---- */
    body, input, textarea, select, button, .form-row {
        font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont,
                     "PingFang TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
    }

    /* ---- 圓角加大（呼應設計系統的 generous rounding） ---- */
    .button, input[type=submit], input[type=button],
    .submit-row input, a.button {
        border-radius: 14px !important;
        padding: 8px 16px !important;
        font-weight: 500 !important;
        border: none !important;
        box-shadow: 0 1px 2px rgba(61, 53, 40, 0.06);
        transition: background 120ms ease;
    }

    /* 模組卡片、表格圓角 */
    .module, .dashboard .module,
    #changelist table, .inline-group, fieldset.module {
        border-radius: 20px !important;
        overflow: hidden;
        border: 1px solid rgba(61, 53, 40, 0.10) !important;
    }

    /* 輸入框圓角 */
    input[type=text], input[type=password], input[type=email],
    input[type=url], input[type=number], textarea, select {
        border-radius: 10px !important;
        border: 1px solid rgba(61, 53, 40, 0.16) !important;
        padding: 7px 10px !important;
    }
    input[type=text]:focus, input[type=password]:focus,
    input[type=email]:focus, textarea:focus, select:focus {
        border-color: #B4502E !important;
        outline: none !important;
        box-shadow: 0 0 0 3px #FBEDE6 !important;
    }

    /* 麵包屑微調 */
    div.breadcrumbs {
        padding: 12px 40px !important;
        font-size: 13px !important;
    }

    /* 頁首高度與 padding */
    #header {
        padding: 14px 40px !important;
    }

    /* 側邊欄（Django 4.1+ 有的 nav-sidebar）暖色 */
    #nav-sidebar {
        background: #F5EFE4 !important;
    }
    #nav-sidebar .current-model {
        background: #FBEDE6 !important;
        border-left: 3px solid #B4502E !important;
    }

    /* 新增這段：控制「成功」提示訊息的顏色*/
    ul.messagelist li.success {
        background-color: #E8D5C4 !important; /* 這裡換成你想要的底色 (例如：淺奶茶色) */
        color: #5C3A21 !important;            /* 這裡換成你想要的文字顏色 (例如：深咖啡色) */
        border: none !important;              /* 把預設的邊框藏起來，看起來會更柔和 */
        /* background-image: none !important; */ /* 如果連原本的綠色小勾勾圖示都想藏起來，可以解除這行的註解 */
    }

/* ============================================================
       完全同步：讓右側「最近的動作」跟左側模組長得一模一樣
       ============================================================ */
       
    /* 1. 把外圍大箱子隱形，消滅雙重框線 */
    #content-related {
        background: transparent !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
    }

    /* 2. 讓右側的卡片擁有跟左側一樣的圓角與底色 */
    #content-related .module {
        background-color: var(--darkened-bg, #F5EFE4) !important;
        border-radius: 20px !important;
        overflow: hidden !important;
        border: 1px solid rgba(61, 53, 40, 0.10) !important;
        margin-bottom: 20px !important;
    }

    /* 3. 讓右側的標題擁有跟左側一樣的陶土色背景與白字！ */
    #content-related .module h2 {
        background-color: var(--primary, #B4502E) !important;
        color: var(--header-color, #FFFCF6) !important;
        padding: 10px 15px !important;
        margin: 0 !important;
        font-weight: 600 !important;
    }

    #content-related .module h3 {
        display: none !important;
    }

</style>
{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        <img src="{% static 'logo.png' %}" alt="衛生局Logo"
             style="height: 40px; vertical-align: middle; margin-right: 10px;">
        高雄市政府衛生局_系統帳密管理
    </a>
</div>
{% endblock %}
