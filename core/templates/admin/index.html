{% extends "admin/index.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div style="display: flex; gap: 20px; margin-bottom: 30px;">
    
    <div class="module" style="flex: 1; padding: 20px; background: var(--darkened-bg); border-radius: 20px;">
        <caption style="text-align: center; font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 15px;">
            🏢 各單位人數分佈
        </caption>
        <div style="height: 250px;">
            <canvas id="deptChart"></canvas>
        </div>
    </div>

    <div class="module" style="flex: 1; padding: 20px; background: var(--darkened-bg); border-radius: 20px;">
        <caption style="text-align: center; font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 15px;">
            🔐 各系統帳號配置數
        </caption>
        <div style="height: 250px;">
            <canvas id="sysChart"></canvas>
        </div>
    </div>

</div>

{{ block.super }}

<script>
    fetch('/api/dashboard/')
        .then(response => response.json())
        .then(data => {
            
            // 繪製左側：甜甜圈圖 (Doughnut)
            new Chart(document.getElementById('deptChart'), {
                type: 'doughnut',
                data: {
                    labels: data.dept_labels,
                    datasets: [{
                        data: data.dept_counts,
                        // 教練特別幫你挑選配對你系統的溫暖大地色系！
                        backgroundColor: ['#B4502E', '#DF9B7C', '#8B8A3F', '#B88436', '#5F8661', '#5083A1', '#3D3528'],
                        borderWidth: 2,
                        borderColor: '#FFFCF6'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 繪製右側：長條圖 (Bar)
            new Chart(document.getElementById('sysChart'), {
                type: 'bar',
                data: {
                    labels: data.sys_labels,
                    datasets: [{
                        label: '已配置帳號數量',
                        data: data.sys_counts,
                        backgroundColor: '#B4502E', // 你的主色：陶土色
                        borderRadius: 6 // 讓長條圖的頂端也有小圓角
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } } // 隱藏多餘的標籤
                }
            });
        });
</script>
{% endblock %}
