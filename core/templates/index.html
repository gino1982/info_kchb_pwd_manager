<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>高雄市政府衛生局帳密管理系統</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 100px; 
            background-color: #f4f7f6; 
        }
        .container {
            background-color: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #2c3e50; }
        p { color: #7f8c8d; font-size: 18px; }
        .btn { 
            display: inline-block; 
            padding: 12px 24px; 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            margin-top: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>帳密管理系統</h1>
        <p>高雄市政府衛生局</p>
        <a href="/admin" class="btn">進入管理後台 ➔</a>
    </div>
</body>
</html>
